<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub de Auditorias LinkedIn - Hidrogest</title>
  
  <!-- Importando o Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Importando React e ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Importando o Babel para rodar JSX no navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gradient-to-br from-[#f0f4f8] via-[#e8f0fe] to-[#f0f4f8] min-h-screen text-slate-800 antialiased">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Ícones SVG
    const ShieldCheck = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg>;
    const ChevronRight = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>;
    const Users = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;

    // Dados dos perfis extraídos dos códigos enviados
    const profiles = [
      {
        id: "anna",
        name: "Anna Pâula do Vale",
        role: "Gerente de Engenharia",
        image: "https://drive.google.com/thumbnail?id=1PXOebax4hkwDSVls3bGbOI3Sm4epWtHz&sz=w400",
        link: "anna.html",
        statusText: "Auditoria Completa",
        statusColor: "text-green-600",
        progressColor: "from-green-400 to-emerald-500",
        progressValue: "100%",
        badge: "Otimizado"
      },
      {
        id: "valdeir",
        name: "Valdeir Resende Pires",
        role: "Técnico Hidrometrista Pleno",
        image: "https://ui-avatars.com/api/?name=Valdeir+Resende&size=200&background=e2e8f0&color=94a3b8",
        link: "valdeir.html",
        statusText: "Fortalecido",
        statusColor: "text-blue-600",
        progressColor: "from-blue-400 to-indigo-500",
        progressValue: "80%",
        badge: "Em Análise"
      },
      {
        id: "franciele",
        name: "Franciele Neri",
        role: "Técnica em Segurança do Trabalho Sênior",
        image: "https://drive.google.com/thumbnail?id=1MzS3wR4nvlmWCClfP3C9tnsoKcnr49VD&sz=w400",
        link: "franciele.html",
        statusText: "Oportunidades Identificadas",
        statusColor: "text-orange-500",
        progressColor: "from-orange-400 to-amber-400",
        progressValue: "35%",
        badge: "Revisão"
      },
      {
        id: "miqueias",
        name: "Miqueias Palmeira",
        role: "Auxiliar de Hidrometrista",
        image: "https://ui-avatars.com/api/?name=Miqueias+Palmeira&size=400&background=e2e8f0&color=64748b",
        link: "miqueias.html",
        statusText: "Nova Sugestão de Perfil",
        statusColor: "text-purple-600",
        progressColor: "from-purple-400 to-pink-500",
        progressValue: "100%",
        badge: "Nova Ideia"
      },
      {
        id: "elias",
        name: "Elias Henrique",
        role: "Auxiliar de Hidrometrista",
        image: "https://ui-avatars.com/api/?name=Elias+Henrique&size=400&background=e2e8f0&color=64748b",
        link: "elias.html",
        statusText: "Nova Sugestão de Perfil",
        statusColor: "text-purple-600",
        progressColor: "from-purple-400 to-pink-500",
        progressValue: "100%",
        badge: "Nova Ideia"
      }
    ];

    function App() {
      const [animateProgress, setAnimateProgress] = useState(false);

      useEffect(() => {
        const timer = setTimeout(() => setAnimateProgress(true), 100);
        return () => clearTimeout(timer);
      }, []);

      const logoHidrogest = "https://drive.google.com/thumbnail?id=1aWt-ZBZIvBdviJ3hoYVExMUoQlFEt15O&sz=w200";

      return (
        <div className="min-h-screen font-sans pb-16">
          
          {/* Header Principal */}
          <div className="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-white shadow-sm">
            <div className="max-w-6xl mx-auto px-4 py-6">
              <div className="flex flex-col md:flex-row items-center justify-between gap-6">
                
                <div className="flex items-center gap-4">
                  <div className="bg-gradient-to-br from-[#0B3B59] to-[#062438] text-white p-3 rounded-2xl shadow-lg shadow-[#0B3B59]/20">
                    <ShieldCheck size={28} />
                  </div>
                  <div>
                    <h1 className="font-extrabold text-2xl text-gray-900 leading-tight tracking-tight">Hub de Auditorias LinkedIn</h1>
                    <p className="text-sm text-gray-500 font-medium mt-0.5 flex items-center gap-1.5">
                      <Users size={16} /> Equipe Hidrogest Engenharia
                    </p>
                  </div>
                </div>

                <div className="hidden md:block">
                  <img src={logoHidrogest} alt="Hidrogest" className="h-12 object-contain" />
                </div>
              </div>
            </div>
          </div>

          {/* Grid de Perfis */}
          <div className="max-w-6xl mx-auto mt-10 px-4">
            <div className="mb-8">
              <h2 className="text-xl font-bold text-gray-800">Perfis Mapeados ({profiles.length})</h2>
              <p className="text-gray-500 text-sm mt-1">Selecione um colaborador abaixo para visualizar o painel detalhado de sugestões.</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
              {profiles.map((profile, index) => (
                <a 
                  key={profile.id}
                  href={profile.link}
                  className="group block bg-white/95 backdrop-blur-xl rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white hover:shadow-xl transition-all duration-300 hover:-translate-y-1 overflow-hidden flex flex-col h-full"
                >
                  {/* Capa Genérica do Card */}
                  <div className="h-24 bg-gradient-to-r from-gray-200 to-gray-300 w-full relative">
                    <div className="absolute top-3 right-3 bg-white/90 backdrop-blur-sm px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider text-gray-700 shadow-sm">
                      {profile.badge}
                    </div>
                  </div>
                  
                  <div className="px-5 pb-5 flex-1 flex flex-col relative">
                    {/* Foto de Perfil */}
                    <div className="relative -mt-10 mb-3">
                      <div className="w-20 h-20 rounded-full border-4 border-white bg-white shadow-md relative overflow-hidden group-hover:scale-105 transition-transform duration-500">
                        <img 
                          src={profile.image} 
                          alt={profile.name} 
                          className="w-full h-full object-cover"
                        />
                      </div>
                    </div>

                    <div className="flex-1">
                      <h3 className="font-bold text-[17px] text-gray-900 leading-tight group-hover:text-[#0a66c2] transition-colors">{profile.name}</h3>
                      <p className="text-sm text-gray-500 font-medium mt-1 line-clamp-2">{profile.role}</p>
                    </div>

                    {/* Barra de Progresso / Status */}
                    <div className="mt-6 pt-5 border-t border-gray-100">
                      <div className="flex justify-between text-xs mb-1.5 font-bold">
                        <span className="text-gray-500">Nível Atual</span>
                        <span className={profile.statusColor}>{profile.statusText}</span>
                      </div>
                      <div className="h-2 w-full bg-gray-100 rounded-full overflow-hidden">
                        <div 
                          className={`h-full rounded-full transition-all duration-1000 ease-out bg-gradient-to-r ${profile.progressColor}`}
                          style={{ width: animateProgress ? profile.progressValue : "0%", transitionDelay: `${index * 150}ms` }}
                        ></div>
                      </div>
                    </div>

                    {/* Botão de Ação */}
                    <div className="mt-5 flex items-center justify-between text-sm font-bold text-[#0a66c2] group-hover:text-[#084e96] transition-colors">
                      <span>Ver Auditoria</span>
                      <div className="bg-blue-50 p-1.5 rounded-full group-hover:bg-blue-100 transition-colors">
                        <ChevronRight size={16} />
                      </div>
                    </div>
                  </div>
                </a>
              ))}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
