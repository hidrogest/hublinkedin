<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub de Auditorias LinkedIn - Hidrogest</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @keyframes subtle-glow {
      0%, 100% { box-shadow: 0 4px 20px rgba(10, 102, 194, 0.05); }
      50% { box-shadow: 0 4px 25px rgba(10, 102, 194, 0.15); }
    }
    .animate-glow { 
      animation: subtle-glow 4s ease-in-out infinite; 
    }
    .shimmer {
      background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
      background-size: 200% 100%;
      animation: shimmer 2s infinite;
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-[#f0f4f8] via-[#e8f0fe] to-[#f0f4f8] min-h-screen text-slate-800 antialiased">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- ÍCONES SVG COMPARTILHADOS ---
    const AlertCircle = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
    const CheckCircle2 = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
    const MapPin = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
    const Mail = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>;
    const Phone = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>;
    const LinkIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>;
    const ChevronRight = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>;
    const Info = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
    const ShieldCheck = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg>;
    const XCircle = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>;
    const DownloadIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
    const CopyIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>;
    const XIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
    const ArrowLeft = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>;
    const GraduationCap = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>;
    const Maximize = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>;
    const Eye = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>;
    const Award = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>;
    const Rocket = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 3.82-13.04L14 3l1.86 1.86c.65.65 1.48 1.15 2.41 1.45L21 7l-2.04 1.18a22 22 0 0 1-13.04 3.82z"/><circle cx="14.5" cy="9.5" r="1.5"/></svg>;
    const Linkedin = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>;
    const Smartphone = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>;
    const Users = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;

    // --- COMPONENTES AUXILIARES COMPARTILHADOS ---
    const CopyInlineButton = ({ text, label = "Copiar", onCopy }) => (
      <button
        onClick={(e) => { e.stopPropagation(); onCopy(text); }}
        className="flex items-center justify-center gap-1.5 px-3 py-1.5 bg-gradient-to-r from-[#0a66c2] to-[#084e96] hover:from-[#084e96] hover:to-[#063970] text-white text-[11px] uppercase tracking-wider font-bold rounded-full transition-all shadow-[0_4px_10px_rgba(10,102,194,0.3)] hover:shadow-[0_6px_15px_rgba(10,102,194,0.4)] hover:-translate-y-0.5 active:scale-95 shrink-0"
        title={`Copiar ${label.toLowerCase()}`}
      >
        <CopyIcon size={14} /> {label}
      </button>
    );

    const Highlight = ({ condition, isFixed, label, description, children, block = false, hideFixedBorder = false, position = 'inline', customIcon = null }) => {
      const [isDismissed, setIsDismissed] = useState(false);
      useEffect(() => { setIsDismissed(false); }, [isFixed]);
      if (!condition) return <>{children}</>;

      const baseStyles = block ? 'block w-full' : 'inline-block';
      const fixedStyles = hideFixedBorder 
        ? 'border-transparent bg-transparent'
        : 'border-green-400 bg-green-50/30 shadow-[0_0_15px_rgba(74,222,128,0.15)]';
      
      const warningStyles = 'border-orange-300 bg-orange-50/40';
      const isOverlay = position.startsWith('overlay');
      const isAbsolute = position !== 'inline' && !isOverlay;
      const showBalloon = description && !isDismissed;

      return (
        <div className={`relative ${baseStyles} ${isOverlay ? '' : (!isAbsolute && showBalloon ? 'mb-3' : '')}`}>
          <div className={`
            ${baseStyles} 
            transition-all duration-700 ease-in-out
            ${!isDismissed ? `border-2 border-dashed rounded-xl p-1 -m-1 ${isFixed ? fixedStyles : warningStyles}` : ''}
          `}>
            {children}
          </div>
          
          {showBalloon && (
            <div className={`
              ${isOverlay || isAbsolute ? 'absolute z-[60] shadow-2xl backdrop-blur-md' : 'relative mt-3 shadow-md hover:shadow-lg'}
              ${position === 'overlay-top-left' || position === 'top-left' ? 'top-2 left-2 sm:top-4 sm:left-4 w-[calc(100%-50px)] sm:w-auto sm:max-w-xs' : ''}
              ${position === 'avatar-tooltip' || position === 'overlay-avatar-tooltip' ? 'top-[105%] left-1/2 -translate-x-1/2 sm:top-2 sm:translate-x-0 sm:left-[110%] sm:ml-2 w-52 sm:w-60' : ''}
              ${!isOverlay && !isAbsolute ? 'w-full max-w-2xl' : ''}
              p-2.5 sm:p-3 rounded-xl text-left border transition-all duration-500
              ${isFixed ? 'bg-gradient-to-br from-green-50 to-emerald-50/95 border-green-200 text-green-900' : 'bg-gradient-to-br from-[#FFF9F2] to-orange-50/95 border-orange-200 text-orange-900'}
            `}>
              
              <button 
                onClick={(e) => { e.preventDefault(); e.stopPropagation(); setIsDismissed(true); }}
                className={`absolute top-1.5 right-1.5 p-1 rounded-full hover:bg-black/5 transition-colors z-50 ${isFixed ? 'text-green-700/50 hover:text-green-800' : 'text-orange-700/50 hover:text-orange-800'}`}
                title="Fechar dica"
              >
                <XIcon size={12} />
              </button>

              {(!isOverlay && !isAbsolute) && (
                <div className={`absolute -top-1.5 left-6 w-3 h-3 rotate-45 border-l border-t ${isFixed ? 'bg-green-50 border-green-200' : 'bg-[#FFF9F2] border-orange-200'}`}></div>
              )}

              {(position === 'avatar-tooltip' || position === 'overlay-avatar-tooltip') && (
                <div className={`absolute -top-1.5 left-1/2 -translate-x-1/2 sm:top-6 sm:-left-1.5 sm:translate-x-0 w-3 h-3 rotate-45 border-l border-t sm:border-t-0 sm:border-b ${isFixed ? 'bg-green-50 border-green-200' : 'bg-[#FFF9F2] border-orange-200'}`}></div>
              )}

              <div className="relative z-10 flex items-start gap-1.5 pr-4">
                <div className="mt-0.5 shrink-0">
                  {customIcon ? customIcon : (isFixed ? <CheckCircle2 size={14} className="text-green-600" /> : <Info size={14} className="text-orange-500" />)}
                </div>
                <div>
                  <strong className={`block mb-0.5 text-[10px] uppercase tracking-wider font-extrabold ${isFixed ? 'text-green-700' : 'text-orange-700'}`}>
                    {label}
                  </strong>
                  <span className="text-[11.5px] leading-tight opacity-90 block">
                    {description}
                  </span>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const ImageComparison = ({ before, after }) => {
      const [pos, setPos] = useState(50);
      const containerRef = useRef(null);
      const [isDragging, setIsDragging] = useState(false);

      const handleMove = (e) => {
        if (!isDragging && e.type === 'mousemove') return;
        const container = containerRef.current;
        if (!container) return;
        
        const rect = container.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let x = clientX - rect.left;
        x = Math.max(0, Math.min(x, rect.width));
        setPos((x / rect.width) * 100);
      };

      return (
        <div 
          ref={containerRef}
          className="relative w-full h-full select-none touch-none group/slider bg-gray-100"
          onMouseDown={(e) => { setIsDragging(true); handleMove(e); }}
          onMouseUp={() => setIsDragging(false)}
          onMouseLeave={() => setIsDragging(false)}
          onMouseMove={handleMove}
          onTouchStart={(e) => { setIsDragging(true); handleMove(e); }}
          onTouchEnd={() => setIsDragging(false)}
          onTouchMove={handleMove}
        >
          <img src={after} className="absolute inset-0 w-full h-full object-cover pointer-events-none" draggable="false" />
          <img src={before} className="absolute inset-0 w-full h-full object-cover pointer-events-none" style={{ clipPath: `inset(0 ${100 - pos}% 0 0)` }} draggable="false" />
          <div className="absolute top-0 bottom-0 w-1.5 bg-white/95 backdrop-blur-sm cursor-ew-resize shadow-[0_0_15px_rgba(0,0,0,0.4)]" style={{ left: `calc(${pos}% - 3px)` }}>
            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-10 h-10 bg-white rounded-full shadow-[0_6px_15px_rgba(0,0,0,0.3)] flex items-center justify-center border border-gray-100 transition-transform group-hover/slider:scale-110">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0a66c2" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l4-4-4-4M9 6l-4 4 4 4"/></svg>
            </div>
          </div>
          <div className="absolute top-4 left-4 bg-black/60 backdrop-blur-md text-white text-[11px] uppercase tracking-wider font-bold px-3 py-1.5 rounded-lg pointer-events-none opacity-0 group-hover/slider:opacity-100 transition-opacity duration-300">Original</div>
          <div className="absolute top-4 right-4 bg-[#0a66c2]/90 backdrop-blur-md text-white text-[11px] uppercase tracking-wider font-bold px-3 py-1.5 rounded-lg pointer-events-none opacity-0 group-hover/slider:opacity-100 transition-opacity duration-300">Edição</div>
        </div>
      );
    };

    // ==========================================
    // HUB COMPONENT
    // ==========================================
    function HubView({ onSelect }) {
      const [animateProgress, setAnimateProgress] = useState(false);
      useEffect(() => {
        const timer = setTimeout(() => setAnimateProgress(true), 100);
        return () => clearTimeout(timer);
      }, []);

      const logoHidrogest = "https://drive.google.com/thumbnail?id=1aWt-ZBZIvBdviJ3hoYVExMUoQlFEt15O&sz=w200";

      const profiles = [
        { id: "anna", name: "Anna Pâula do Vale", role: "Gerente de Engenharia", image: "https://drive.google.com/thumbnail?id=1PXOebax4hkwDSVls3bGbOI3Sm4epWtHz&sz=w400", statusText: "Auditoria Completa", statusColor: "text-green-600", progressColor: "from-green-400 to-emerald-500", progressValue: "100%", badge: "Otimizado" },
        { id: "valdeir", name: "Valdeir Resende Pires", role: "Técnico Hidrometrista Pleno", image: "https://ui-avatars.com/api/?name=Valdeir+Resende&size=200&background=e2e8f0&color=94a3b8", statusText: "Fortalecido", statusColor: "text-blue-600", progressColor: "from-blue-400 to-indigo-500", progressValue: "80%", badge: "Em Análise" },
        { id: "franciele", name: "Franciele Neri", role: "Técnica em Segurança do Trabalho Sênior", image: "https://drive.google.com/thumbnail?id=1MzS3wR4nvlmWCClfP3C9tnsoKcnr49VD&sz=w400", statusText: "Oportunidades Identificadas", statusColor: "text-orange-500", progressColor: "from-orange-400 to-amber-400", progressValue: "35%", badge: "Revisão" },
        { id: "miqueias", name: "Miqueias Palmeira", role: "Auxiliar de Hidrometrista", image: "https://ui-avatars.com/api/?name=Miqueias+Palmeira&size=400&background=e2e8f0&color=64748b", statusText: "Nova Sugestão de Perfil", statusColor: "text-purple-600", progressColor: "from-purple-400 to-pink-500", progressValue: "100%", badge: "Nova Ideia" },
        { id: "elias", name: "Elias Henrique", role: "Auxiliar de Hidrometrista", image: "https://ui-avatars.com/api/?name=Elias+Henrique&size=400&background=e2e8f0&color=64748b", statusText: "Nova Sugestão de Perfil", statusColor: "text-purple-600", progressColor: "from-purple-400 to-pink-500", progressValue: "100%", badge: "Nova Ideia" }
      ];

      return (
        <div className="min-h-screen font-sans pb-16">
          <div className="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-white shadow-sm">
            <div className="max-w-6xl mx-auto px-4 py-6">
              <div className="flex flex-col md:flex-row items-center justify-between gap-6">
                <div className="flex items-center gap-4">
                  <div className="bg-gradient-to-br from-[#0B3B59] to-[#062438] text-white p-3 rounded-2xl shadow-lg shadow-[#0B3B59]/20">
                    <ShieldCheck size={28} />
                  </div>
                  <div>
                    <h1 className="font-extrabold text-2xl text-gray-900 leading-tight tracking-tight">Hub de Auditorias LinkedIn</h1>
                    <p className="text-sm text-gray-500 font-medium mt-0.5 flex items-center gap-1.5"><Users size={16} /> Equipe Hidrogest Engenharia</p>
                  </div>
                </div>
                <div className="hidden md:block"><img src={logoHidrogest} alt="Hidrogest" className="h-12 object-contain" /></div>
              </div>
            </div>
          </div>

          <div className="max-w-6xl mx-auto mt-10 px-4">
            <div className="mb-8">
              <h2 className="text-xl font-bold text-gray-800">Perfis Mapeados ({profiles.length})</h2>
              <p className="text-gray-500 text-sm mt-1">Selecione um colaborador abaixo para visualizar o painel detalhado de sugestões.</p>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
              {profiles.map((profile, index) => (
                <button 
                  key={profile.id}
                  onClick={() => onSelect(profile.id)}
                  className="group text-left block bg-white/95 backdrop-blur-xl rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white hover:shadow-xl transition-all duration-300 hover:-translate-y-1 overflow-hidden flex flex-col h-full"
                >
                  <div className="h-24 bg-gradient-to-r from-gray-200 to-gray-300 w-full relative">
                    <div className="absolute top-3 right-3 bg-white/90 backdrop-blur-sm px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider text-gray-700 shadow-sm">{profile.badge}</div>
                  </div>
                  <div className="px-5 pb-5 flex-1 flex flex-col relative">
                    <div className="relative -mt-10 mb-3">
                      <div className="w-20 h-20 rounded-full border-4 border-white bg-white shadow-md relative overflow-hidden group-hover:scale-105 transition-transform duration-500">
                        <img src={profile.image} alt={profile.name} className="w-full h-full object-cover" />
                      </div>
                    </div>
                    <div className="flex-1">
                      <h3 className="font-bold text-[17px] text-gray-900 leading-tight group-hover:text-[#0a66c2] transition-colors">{profile.name}</h3>

    // ==========================================
    // APP CONTROLLER (ROUTER)
    // ==========================================
    function App() {
      // Estado que controla qual página está visível
      const [currentView, setCurrentView] = useState('hub');

      // Função genérica para voltar para a Home (Hub)
      const goBackToHub = () => {
        window.scrollTo(0, 0);
        setCurrentView('hub');
      };

      // Controle de navegação das páginas
      if (currentView === 'anna') {
        return <ProfileAnna onBack={goBackToHub} />;
      } else if (currentView === 'valdeir') {
        return <ProfileValdeir onBack={goBackToHub} />;
      } else if (currentView === 'franciele') {
        return <ProfileFranciele onBack={goBackToHub} />;
      } else if (currentView === 'miqueias') {
        return <ProfileMiqueias onBack={goBackToHub} />;
      } else if (currentView === 'elias') {
        return <ProfileElias onBack={goBackToHub} />;
      }

      // Se nenhum perfil for clicado, mostra o Hub
      return <HubView onSelect={(id) => {
        window.scrollTo(0, 0);
        setCurrentView(id);
      }} />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
