<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub de Auditorias - Hidrogest</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; }
    
    /* Animação suave para a entrada dos cards */
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fade-in-up 0.6s ease-out forwards;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-[#f4f7fa] via-[#e8f0fe] to-[#f4f7fa] min-h-screen text-slate-800 antialiased selection:bg-blue-200">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- Ícones SVG ---
    const Search = ({ size = 20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
    const ShieldCheck = ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg>;
    const Users = ({ size = 20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
    const ExternalLink = ({ size = 16 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>;
    const LinkedIn = ({ size = 20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.849-3.037-1.85 0-2.133 1.448-2.133 2.944v5.662H9.356V9h3.414v1.566h.049c.475-.9 1.636-1.85 3.367-1.85 3.596 0 4.261 2.366 4.261 5.445v6.291zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>;
    const FilterIcon = ({ size = 18 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>;

    // --- Dados da Equipe ---
    const team = [
      {
        id: "antonio",
        nome: "Antônio José Machado",
        cargo: "Sócio Diretor & Engenheiro Responsável",
        departamento: "Diretoria",
        score: 20,
        avatar: "https://drive.google.com/thumbnail?id=1oVlnmBTZLUafU_TOQ26-Zjz2XQb6JOLJ&sz=w400",
        fallback: "https://ui-avatars.com/api/?name=Antonio+Machado&size=200&background=0B3B59&color=fff",
        url: "https://hidrogest.github.io/antoniolinkedin"
      },
      {
        id: "anna",
        nome: "Anna Pâula do Vale",
        cargo: "Gerente de Engenharia",
        departamento: "Engenharia",
        score: 60,
        avatar: "https://drive.google.com/thumbnail?id=1PXOebax4hkwDSVls3bGbOI3Sm4epWtHz&sz=w400",
        fallback: "https://ui-avatars.com/api/?name=Anna+Paula&size=200&background=0a66c2&color=fff",
        url: "https://hidrogest.github.io/annalinkedin"
      },
      {
        id: "rosangela",
        nome: "Rosângela Gurgel Machado",
        cargo: "Engenheira Ambiental Master",
        departamento: "Engenharia",
        score: 30,
        avatar: "https://drive.google.com/thumbnail?id=13XuqTXyPS6Ny2qN29QFF22F6av_zH9D2&sz=w400",
        fallback: "https://ui-avatars.com/api/?name=Rosangela+Gurgel&size=200&background=0a66c2&color=fff",
        url: "https://hidrogest.github.io/rosangelalinkedin"
      },
      {
        id: "michel",
        nome: "Michel Oliveira",
        cargo: "Coordenador de Hidrometria e Topografia",
        departamento: "Operações",
        score: 30,
        avatar: "https://drive.google.com/thumbnail?id=1qXaR0DNGRbNJcfWQ5yKkeR1ycboDx6lp&sz=w400",
        fallback: "https://ui-avatars.com/api/?name=Michel+Oliveira&size=200&background=0a66c2&color=fff",
        url: "https://hidrogest.github.io/michellinkedin"
      },
      {
        id: "mariane",
        nome: "Mariane Rodrigues Silveira",
        cargo: "Gestão Administrativa e Financeira",
        departamento: "Administrativo",
        score: 30,
        avatar: "https://drive.google.com/thumbnail?id=1To0II_tJNLy4F6bxqCrNOs_DodpEE0bk&sz=w400",
        fallback: "https://ui-avatars.com/api/?name=Mariane+Silveira&size=200&background=0a66c2&color=fff",
        url: "https://hidrogest.github.io/marianelinkedin"
      }
    ];

    const logoHidrogest = "https://drive.google.com/thumbnail?id=1aWt-ZBZIvBdviJ3hoYVExMUoQlFEt15O&sz=w200";

    function App() {
      const [searchTerm, setSearchTerm] = useState("");
      const [selectedDept, setSelectedDept] = useState("Todos");
      const [animateBars, setAnimateBars] = useState(false);

      useEffect(() => {
        const timer = setTimeout(() => setAnimateBars(true), 300);
        return () => clearTimeout(timer);
      }, []);

      const departments = ["Todos", ...new Set(team.map(t => t.departamento))];

      const filteredTeam = useMemo(() => {
        return team.filter(member => {
          const matchesSearch = member.nome.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                member.cargo.toLowerCase().includes(searchTerm.toLowerCase());
          const matchesDept = selectedDept === "Todos" || member.departamento === selectedDept;
          return matchesSearch && matchesDept;
        });
      }, [searchTerm, selectedDept]);

      const averageScore = Math.round(team.reduce((acc, curr) => acc + curr.score, 0) / team.length);

      return (
        <div className="pb-20">
          {/* Header Corporativo */}
          <header className="bg-white border-b border-gray-200/60 shadow-[0_4px_30px_rgb(0,0,0,0.03)] sticky top-0 z-50 backdrop-blur-xl bg-white/90">
            <div className="max-w-6xl mx-auto px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center gap-4">
                <img src={logoHidrogest} alt="Hidrogest" className="h-12 object-contain" />
                <div className="h-8 w-px bg-gray-200 hidden sm:block"></div>
                <div>
                  <h1 className="text-xl font-bold text-[#0B3B59] leading-tight flex items-center gap-2">
                    <ShieldCheck size={22} className="text-[#0a66c2]" />
                    Hub de Auditorias
                  </h1>
                  <p className="text-sm font-medium text-gray-500">Otimização de Perfis do LinkedIn</p>
                </div>
              </div>

              {/* Status Geral da Equipe */}
              <div className="hidden md:flex items-center gap-6 bg-slate-50 border border-slate-100 px-5 py-2.5 rounded-2xl shadow-inner">
                <div className="flex items-center gap-3">
                  <div className="p-2 bg-blue-100 rounded-lg text-[#0a66c2]">
                    <Users size={20} />
                  </div>
                  <div>
                    <p className="text-xs text-gray-500 font-bold uppercase tracking-wider">Membros</p>
                    <p className="text-lg font-bold text-slate-800 leading-none">{team.length}</p>
                  </div>
                </div>
                <div className="w-px h-8 bg-slate-200"></div>
                <div className="flex items-center gap-3">
                  <div className="p-2 bg-green-100 rounded-lg text-green-600">
                    <LinkedIn size={20} />
                  </div>
                  <div>
                    <p className="text-xs text-gray-500 font-bold uppercase tracking-wider">Score Geral</p>
                    <div className="flex items-center gap-2">
                      <div className="w-16 h-2 bg-gray-200 rounded-full overflow-hidden">
                        <div className="h-full bg-[#0a66c2] transition-all duration-1000 ease-out" style={{ width: animateBars ? `${averageScore}%` : '0%' }}></div>
                      </div>
                      <span className="text-sm font-bold text-slate-800">{averageScore}%</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-6 mt-10">
            {/* Seção de Filtros */}
            <div className="bg-white rounded-2xl p-4 sm:p-6 shadow-sm border border-gray-100 mb-8 animate-fade-in" style={{ animationDelay: '0.1s' }}>
              <div className="flex flex-col md:flex-row gap-4 justify-between items-center">
                
                {/* Search */}
                <div className="relative w-full md:max-w-md group">
                  <div className="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400 group-focus-within:text-[#0B3B59] transition-colors">
                    <Search size={18} />
                  </div>
                  <input
                    type="text"
                    className="block w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-[#0B3B59]/20 focus:border-[#0B3B59] transition-all outline-none"
                    placeholder="Buscar por nome ou cargo..."
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                  />
                </div>

                {/* Filtro de Departamentos */}
                <div className="flex items-center gap-2 overflow-x-auto w-full md:w-auto pb-2 md:pb-0 hide-scrollbar">
                  <div className="flex items-center text-gray-400 mr-2 shrink-0">
                    <FilterIcon size={16} />
                  </div>
                  {departments.map(dept => (
                    <button
                      key={dept}
                      onClick={() => setSelectedDept(dept)}
                      className={`px-4 py-2 rounded-xl text-sm font-bold whitespace-nowrap transition-all duration-300 ${
                        selectedDept === dept 
                        ? 'bg-[#0B3B59] text-white shadow-md shadow-[#0B3B59]/20 scale-100' 
                        : 'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 hover:border-gray-300 scale-95 hover:scale-100'
                      }`}
                    >
                      {dept}
                    </button>
                  ))}
                </div>
              </div>
            </div>

            {/* Grid de Perfis */}
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
              {filteredTeam.length > 0 ? (
                filteredTeam.map((member, index) => (
                  <div 
                    key={member.id} 
                    className="bg-white rounded-3xl p-6 border border-white shadow-[0_8px_30px_rgb(0,0,0,0.04)] hover:shadow-[0_20px_40px_rgb(11,59,89,0.08)] transition-all duration-500 hover:-translate-y-1 group flex flex-col h-full animate-fade-in"
                    style={{ animationDelay: `${(index + 1) * 0.1}s` }}
                  >
                    {/* Departamento Tag */}
                    <div className="flex justify-between items-start mb-4">
                      <span className="inline-flex bg-blue-50 text-[#0a66c2] text-[11px] font-bold px-3 py-1 rounded-full uppercase tracking-wider border border-blue-100/50">
                        {member.departamento}
                      </span>
                      <div className="text-[#0a66c2] opacity-20 group-hover:opacity-100 transition-opacity">
                        <LinkedIn size={24} />
                      </div>
                    </div>

                    {/* Foto e Info Principal */}
                    <div className="flex items-center gap-4 mb-6">
                      <div className="relative">
                        <div className="w-16 h-16 rounded-full p-0.5 bg-gradient-to-tr from-gray-200 to-gray-100 group-hover:from-[#0a66c2] group-hover:to-cyan-400 transition-colors duration-500 shadow-sm">
                          <img 
                            src={member.avatar} 
                            alt={member.nome} 
                            className="w-full h-full object-cover rounded-full border-2 border-white"
                            onError={(e) => { e.target.src = member.fallback }}
                          />
                        </div>
                        {member.score >= 50 && (
                          <div className="absolute -bottom-1 -right-1 bg-green-500 text-white rounded-full p-0.5 border-2 border-white shadow-sm">
                            <ShieldCheck size={12} />
                          </div>
                        )}
                      </div>
                      <div>
                        <h2 className="text-lg font-bold text-gray-900 leading-tight group-hover:text-[#0B3B59] transition-colors">{member.nome}</h2>
                        <p className="text-sm text-gray-500 line-clamp-2 mt-0.5">{member.cargo}</p>
                      </div>
                    </div>

                    {/* Barra de Progresso da Auditoria */}
                    <div className="mt-auto pt-4 border-t border-gray-100">
                      <div className="flex justify-between text-xs font-bold mb-2">
                        <span className="text-gray-500 uppercase tracking-wider">Status da Auditoria</span>
                        <span className={member.score >= 50 ? "text-green-600" : "text-amber-500"}>
                          {member.score}% {member.score >= 50 ? 'Otimizado' : 'Iniciado'}
                        </span>
                      </div>
                      <div className="h-2 w-full bg-gray-100 rounded-full overflow-hidden shadow-inner mb-6">
                        <div 
                          className={`h-full rounded-full transition-all duration-1000 ease-out relative ${
                            member.score >= 50 ? "bg-green-500" : "bg-gradient-to-r from-amber-400 to-orange-400"
                          }`}
                          style={{ width: animateBars ? `${member.score}%` : '0%' }}
                        ></div>
                      </div>

                      {/* Botão de Ação Redirecionando para a URL desejada */}
                      <button 
                        onClick={() => window.location.href = member.url}
                        className="w-full flex items-center justify-center gap-2 bg-gradient-to-r from-[#0B3B59] to-[#062438] hover:from-[#082a40] hover:to-[#041622] text-white py-3 px-4 rounded-xl text-sm font-bold shadow-lg shadow-[#0B3B59]/20 transition-all hover:shadow-xl hover:scale-[1.02] active:scale-95"
                      >
                        Acessar Auditoria <ExternalLink size={16} />
                      </button>
                    </div>
                  </div>
                ))
              ) : (
                <div className="col-span-full py-20 text-center bg-white rounded-3xl border border-dashed border-gray-300">
                  <div className="mx-auto w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center text-gray-400 mb-4">
                    <Search size={32} />
                  </div>
                  <h3 className="text-lg font-bold text-gray-900">Nenhum profissional encontrado</h3>
                  <p className="text-gray-500">Tente ajustar o termo de busca ou filtro de departamento.</p>
                  <button 
                    onClick={() => {setSearchTerm(""); setSelectedDept("Todos");}}
                    className="mt-4 text-[#0a66c2] font-bold hover:underline"
                  >
                    Limpar filtros
                  </button>
                </div>
              )}
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <style>
    /* Ocultar barra de rolagem nos filtros horizontais em dispositivos móveis */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</body>
</html>
