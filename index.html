<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub de Auditorias — Hidrogest</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    /* Variáveis de Tema: Cores base e Modo Claro */
    :root {
      --brand-title: #0B3B59;
      --brand-primary: #0a66c2;
      --brand-hover: #1478d4;
      --navy-btn: #0B3B59;
      --navy-btn-hover: #0e4a72;
      
      /* Superfícies e Fundos */
      --bg-base: #f8fafc;
      --bg-card: #ffffff;
      --bg-header: rgba(255, 255, 255, 0.85);
      --border-subtle: #dde3ea;
      --border-card: #dde3ea;
      
      /* Textos */
      --text-strong: #1e3140;
      --text-base: #4d6475;
      --text-muted: #8fa3b0;
      
      /* Badges e Status */
      --badge-green-bg: #ecfdf5;
      --badge-green-text: #059669;
      --badge-green-border: #a7f3d0;
      
      --badge-blue-bg: #e8f3ff;
      --badge-blue-text: #0a66c2;
      --badge-blue-border: #bfdbfe;
      
      --badge-orange-bg: #fff7ed;
      --badge-orange-text: #c2410c;
      --badge-orange-border: #fed7aa;
      
      --badge-purple-bg: #fdf4ff;
      --badge-purple-text: #c026d3;
      --badge-purple-border: #f5d0fe;
      
      --badge-gray-bg: #f0f4f8;
      --badge-gray-text: #4d6475;
      --badge-gray-border: #dde3ea;

      /* Scores */
      --score-low: #f59e0b;
      --score-mid: #0a66c2;
      --score-high: #059669;

      /* Efeitos */
      --shadow-hover: 0 12px 32px rgba(11, 59, 89, 0.1);
      --glow-1: rgba(10, 102, 194, 0.08);
      --glow-2: rgba(0, 180, 170, 0.07);
    }

    /* Modo Escuro */
    [data-theme="dark"] {
      --brand-title: #f8fafc;
      --brand-primary: #38bdf8;
      --brand-hover: #7dd3fc;
      --navy-btn: #38bdf8;
      --navy-btn-hover: #0284c7;
      
      /* Superfícies e Fundos */
      --bg-base: #0f172a;
      --bg-card: #1e293b;
      --bg-header: rgba(15, 23, 42, 0.85);
      --border-subtle: #334155;
      --border-card: #334155;
      
      /* Textos */
      --text-strong: #f8fafc;
      --text-base: #cbd5e1;
      --text-muted: #94a3b8;
      
      /* Badges e Status (Tons adaptados para leitura noturna) */
      --badge-green-bg: rgba(16, 185, 129, 0.15);
      --badge-green-text: #34d399;
      --badge-green-border: rgba(52, 211, 153, 0.3);
      
      --badge-blue-bg: rgba(56, 189, 248, 0.15);
      --badge-blue-text: #7dd3fc;
      --badge-blue-border: rgba(125, 211, 252, 0.3);
      
      --badge-orange-bg: rgba(245, 158, 11, 0.15);
      --badge-orange-text: #fbbf24;
      --badge-orange-border: rgba(251, 191, 36, 0.3);
      
      --badge-purple-bg: rgba(192, 38, 211, 0.15);
      --badge-purple-text: #e879f9;
      --badge-purple-border: rgba(232, 121, 249, 0.3);
      
      --badge-gray-bg: rgba(148, 163, 184, 0.1);
      --badge-gray-text: #94a3b8;
      --badge-gray-border: #334155;

      /* Scores */
      --score-low: #fbbf24;
      --score-mid: #38bdf8;
      --score-high: #34d399;

      /* Efeitos */
      --shadow-hover: 0 12px 32px rgba(0, 0, 0, 0.4);
      --glow-1: rgba(56, 189, 248, 0.05);
      --glow-2: rgba(52, 211, 153, 0.05);
    }

    /* Estilos Globais e Transições */
    body { 
      font-family: 'DM Sans', sans-serif; 
      background: var(--bg-base); 
      color: var(--text-strong); 
      min-height: 100vh; 
      overflow-x: hidden; 
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -1;
      background: radial-gradient(ellipse 60% 50% at 10% 10%, var(--glow-1) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 60% at 90% 80%, var(--glow-2) 0%, transparent 60%), var(--bg-base);
      transition: background 0.3s ease;
    }
    
    /* Header & Toolbar */
    header { 
      position: sticky; top: 0; z-index: 100; 
      background: var(--bg-header); 
      backdrop-filter: blur(20px); 
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-subtle); 
      transition: background-color 0.3s, border-color 0.3s;
    }
    .header-inner { max-width: 1280px; margin: 0 auto; padding: 0 2rem; height: 72px; display: flex; align-items: center; justify-content: space-between; gap: 1.5rem; }
    .header-brand { display: flex; align-items: center; gap: 1rem; }
    
    /* Regras para os logos alternarem automaticamente */
    .brand-logo { height: 40px; }
    .logo-dark { display: none; }
    [data-theme="dark"] .logo-light { display: none; }
    [data-theme="dark"] .logo-dark { display: block; }
    
    /* Fonte do título atualizada para Nunito (mais arredondada) */
    .brand-title { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.25rem; color: var(--brand-title); transition: color 0.3s; }
    .brand-sub { font-size: .72rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; }
    
    .header-actions { display: flex; align-items: center; gap: 1.5rem; }
    .header-stats { display: flex; gap: 1.5rem; background: var(--bg-base); border: 1px solid var(--border-subtle); border-radius: 14px; padding: .6rem 1.2rem; transition: background-color 0.3s, border-color 0.3s; }
    .stat-item { display: flex; align-items: center; gap: .6rem; }
    .stat-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .stat-icon.blue { background: var(--badge-blue-bg); color: var(--badge-blue-text); }
    .stat-icon.green { background: var(--badge-green-bg); color: var(--badge-green-text); }
    .stat-label { font-size: .65rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin-bottom: 2px; display: block;}
    .stat-value { font-size: 1.1rem; font-weight: 700; line-height: 1; color: var(--text-strong); }
    .score-bar-track { width: 72px; height: 6px; background: var(--border-subtle); border-radius: 99px; overflow: hidden; display: inline-block; }
    .score-bar-fill { height: 100%; background: var(--brand-primary); transition: width 1s ease, background-color 0.3s; }
    
    /* Botão Dark Mode */
    .theme-toggle {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      color: var(--text-strong);
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: 0.2s ease;
    }
    .theme-toggle:hover { background: var(--border-subtle); transform: scale(1.05); }

    main { max-width: 1280px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }
    .toolbar { display: flex; gap: 1rem; margin-bottom: 2rem; background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 16px; padding: .9rem 1.2rem; transition: background-color 0.3s, border-color 0.3s; }
    .search-wrap { position: relative; flex: 1; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
    .search-input { width: 100%; padding: .65rem 1rem .65rem 2.75rem; background: var(--bg-base); border: 1px solid var(--border-subtle); border-radius: 99px; font: inherit; font-size: .875rem; color: var(--text-strong); outline: none; transition: 0.2s; }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--brand-primary); box-shadow: 0 0 0 3px var(--glow-1); }
    
    /* Cards */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 1.25rem; }
    .card { background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 20px; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.25rem; animation: fadeUp .5s ease forwards; transition: transform .3s ease, box-shadow .3s ease, background-color 0.3s, border-color 0.3s; }
    .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); border-color: var(--border-subtle); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .dept-badge, .recent-badge { font-size: .65rem; font-weight: 700; text-transform: uppercase; padding: .3rem .75rem; border-radius: 99px; border: 1px solid; transition: 0.3s; }
    .dept-badge { background: var(--badge-gray-bg); color: var(--badge-gray-text); border-color: var(--badge-gray-border); }
    .recent-badge { background: var(--badge-purple-bg); color: var(--badge-purple-text); border-color: var(--badge-purple-border); display: flex; gap: .25rem; align-items: center; }
    .li-icon { color: var(--border-subtle); transition: color 0.3s; } .card:hover .li-icon { color: var(--brand-primary); }
    
    .card-identity { text-align: center; display: flex; flex-direction: column; align-items: center; gap: .75rem; }
    .avatar-wrap { position: relative; }
    .avatar { width: 76px; height: 76px; border-radius: 50%; object-fit: cover; border: 3px solid var(--bg-card); box-shadow: 0 0 0 2px var(--border-subtle); transition: box-shadow 0.3s; }
    .avatar.pending { background: var(--badge-gray-bg); color: var(--text-muted); display: flex; align-items: center; justify-content: center; }
    .card:hover .avatar:not(.pending) { box-shadow: 0 0 0 3px var(--brand-primary); }
    .score-badge { position: absolute; bottom: 0; right: -2px; width: 22px; height: 22px; border-radius: 50%; background: var(--score-high); border: 2px solid var(--bg-card); display: flex; align-items: center; justify-content: center; color: #fff;}
    
    .card-name { font-size: 1.05rem; font-weight: 700; color: var(--text-strong); transition: color 0.2s; } 
    .card:hover .card-name { color: var(--brand-primary); }
    .card-role { font-size: .8rem; color: var(--text-muted); }
    
    .verify-pill { display: inline-flex; gap: .45rem; font-size: .75rem; font-weight: 700; padding: .4rem 1rem; border-radius: 8px; margin-top: 8px; width: 100%; justify-content: center; align-items: center; transition: 0.3s; }
    .verify-pill.confirmed { background: var(--badge-green-bg); color: var(--badge-green-text); border: 1px solid var(--badge-green-border); }
    .verify-pill.pending { background: var(--badge-orange-bg); color: var(--badge-orange-text); border: 1px solid var(--badge-orange-border); }
    .verify-pill.working { background: var(--badge-gray-bg); color: var(--badge-gray-text); border: 1px solid var(--badge-gray-border); }
    
    .card-footer { margin-top: auto; padding-top: 1.25rem; border-top: 1px solid var(--border-subtle); display: flex; flex-direction: column; gap: .75rem; transition: border-color 0.3s; }
    .progress-meta { display: flex; justify-content: space-between; align-items: flex-end; }
    .progress-label, .score-status { font-size: .65rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); }
    .score-num { font-size: 1.2rem; font-weight: 800; line-height: 1; }
    .score-num.high, .score-status.high { color: var(--score-high); } 
    .score-num.mid, .score-status.mid { color: var(--score-mid); } 
    .score-num.low, .score-status.low { color: var(--score-low); }
    .progress-track { height: 8px; background: var(--border-subtle); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; transition: width 1s ease, background-color 0.3s; }
    .progress-fill.high { background: var(--score-high); } 
    .progress-fill.mid { background: var(--brand-primary); } 
    .progress-fill.low { background: var(--score-low); }
    
    .card-cta { display: flex; align-items: center; justify-content: center; gap: .4rem; background: var(--navy-btn); color: #fff; border-radius: 10px; padding: .75rem; font-size: .82rem; font-weight: 600; text-decoration: none; transition: .2s; }
    [data-theme="dark"] .card-cta { color: var(--bg-base); }
    .card-cta:not(.disabled):hover { background: var(--navy-btn-hover); transform: translateY(-1px); }
    .card-cta.disabled { background: var(--border-subtle); color: var(--text-muted); cursor: not-allowed; }
    
    @media (max-width: 640px) { .header-stats { display: none; } main { padding: 1.5rem 1rem; } }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-brand">
        <img class="brand-logo logo-light" src="https://drive.google.com/thumbnail?id=1X5-RC14ZWY1Unn4bxS8ZPPoUxbf1ZRH_&sz=w400" alt="Hidrogest">
        <img class="brand-logo logo-dark" src="https://drive.google.com/thumbnail?id=1oi5x7yT3490ti7VgX4T4HDBtU6A31pnV&sz=w400" alt="Hidrogest">

          <div><span class="stat-label">Membros</span><span class="stat-value" id="stat-count">—</span></div></div>
          <div class="stat-item"><div class="stat-icon green"><svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M20.4 20.4h-3.5v-5.5c0-1.3 0-3-1.8-3s-2.1 1.4-2.1 2.9v5.6H9.3V9h3.4v1.5c.5-.9 1.6-1.8 3.3-1.8 3.6 0 4.2 2.3 4.2 5.4v6.3zM5.3 7.4c-1.1 0-2-.9-2-2 0-1.1.9-2 2-2s2 .9 2 2c0 1.1-.9 2-2 2zm1.7 13H3.5V9h3.5v11.4zM22.2 0H1.7C.7 0 0 .7 0 1.7v20.5C0 23.2.7 24 1.7 24h20.4c1 0 1.7-.7 1.7-1.7V1.7C24 .7 23.2 0 22.2 0z"/></svg></div>
          <div><span class="stat-label">Score Médio</span><div style="display:flex;gap:8px;align-items:center"><div class="score-bar-track"><div class="score-bar-fill" id="avg-bar" style="width:0%"></div></div><span class="stat-value" id="stat-avg">—</span></div></div></div>
        </div>
        <button id="theme-toggle" class="theme-toggle" aria-label="Alternar modo escuro" title="Alternar tema">
          <svg id="theme-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            </svg>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <div class="search-wrap">
        <svg class="search-icon" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search" class="search-input" type="text" placeholder="Buscar por nome ou cargo…" autocomplete="off">
      </div>
    </div>
    <div class="card-grid" id="grid"></div>
  </main>

  <script>
    // Lógica do Modo Escuro
    const themeBtn = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    const root = document.documentElement;
    
    const icons = {
      sun: `<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>`,
      moon: `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`
    };

    function setTheme(theme) {
      root.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      themeIcon.innerHTML = theme === 'dark' ? icons.sun : icons.moon;
    }

    // Inicialização do tema (verifica preferência salva ou do sistema)
    const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    setTheme(savedTheme);

    themeBtn.addEventListener('click', () => {
      const newTheme = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      setTheme(newTheme);
    });

    // Dados
    const TEAM = [
      { nome: "Antônio José Machado", cargo: "Sócio Diretor & Eng. Responsável", score: 100, verificado: false, recente: true, avatar: "https://drive.google.com/thumbnail?id=1-jBHy0UWqwNi5RAvII22ltyVMfxuj4Xn&sz=w400", url: "https://hidrogest.github.io/antoniolinkedin" },
      { nome: "Thiago Gurgel Machado", cargo: "Diretor de Operações", score: 30, verificado: false, recente: true, avatar: "https://drive.google.com/thumbnail?id=1ZFV4kqfKwUJL1cpiTpF8IdA5KO0wmkq2&sz=w400", url: "https://hidrogest.github.io/thiagolinkedin" },
      { nome: "Anna Pâula do Vale", cargo: "Gerente de Engenharia", score: 90, verificado: true, recente: false, avatar: "https://drive.google.com/thumbnail?id=1PXOebax4hkwDSVls3bGbOI3Sm4epWtHz&sz=w400", url: "https://hidrogest.github.io/annalinkedin" },
      { nome: "Rosângela Gurgel Machado", cargo: "Diretora Técnica em Engenharia", score: 100, verificado: false, recente: false, avatar: "https://drive.google.com/thumbnail?id=1KZ-A61W689c2rvUvocNZpEhaqxpsFZ4_&sz=w400", url: "https://hidrogest.github.io/rosangelalinkedin" },
      { nome: "Michel Oliveira", cargo: "Coord. de Hidrometria e Topografia", score: 100, verificado: true, recente: false, avatar: "https://drive.google.com/thumbnail?id=1Fe4yCPfrkCqWWUERvMC4HGS3pY76JBwg&sz=w400", url: "https://hidrogest.github.io/michellinkedin" },
      { nome: "Mariane Rodrigues Silveira", cargo: "Gestão Adm. e Financeira", score: 30, verificado: true, recente: true, avatar: "https://drive.google.com/thumbnail?id=1To0II_tJNLy4F6bxqCrNOs_DodpEE0bk&sz=w400", url: "https://hidrogest.github.io/marianelinkedin" },
      { nome: "Leonardo Gurgel Machado", cargo: "Diretor Executivo", score: 95, verificado: true, recente: true, avatar: "https://drive.google.com/thumbnail?id=1S5nhIbBQXa7asM34lzmIf6bYBm5CiY25&sz=w800", url: "https://hidrogest.github.io/leonardolinkedin" },
      { nome: "Altamir Teixeira da Gama", cargo: "Técnico Hidrometrista Sênior", score: 100, verificado: false, recente: true, avatar: "https://drive.google.com/thumbnail?id=13eQo8nqMCL67PRPlAd7BcqchJVP-iLVd&sz=w800", url: "https://hidrogest.github.io/altamirlinkedin" },
      { nome: "Dieyme Junior Dornas de Amorim", cargo: "Técnico Hidrometrista & Marinheiro Fluvial", score: 100, verificado: false, recente: true, avatar: "https://drive.google.com/thumbnail?id=1joo7Z6vBMKFMYzYySR9gGl6BXKYCEKRO&sz=w800", url: "https://hidrogest.github.io/dieymelinkedin" },
      { nome: "Glayson Alves de Jesus", cargo: "Analista Financeiro e de Qualidade Sênior", score: 100, verificado: false, recente: true, avatar: "https://drive.google.com/thumbnail?id=1R9iGTL_wu-NiDj1LmrFLZyE-zHqAB8dg&sz=w800", url: "https://hidrogest.github.io/glaysonlinkedin" },

      { nome: "João Pedro Nascimento de Sousa", cargo: "Técnico Ambiental", score: 100, verificado: false, recente: true, avatar: "https://drive.google.com/thumbnail?id=1214VTK6PnbfHN6djgbhLxj9dLEksTHQo&sz=w800", url: "https://hidrogest.github.io/joaopedrolinkedin" },
      { nome: "Douglas Maxiliano Rosa de Oliveira", cargo: "Técnico Hidrometrista Júnior", score: 100, verificado: false, recente: true, avatar: "https://ui-avatars.com/api/?name=Douglas+Maxiliano&size=400&background=0a66c2&color=fff", url: "https://hidrogest.github.io/douglaslinkedin" },
      { nome: "Rafael Pereira dos Santos", cargo: "Técnico em Meio Ambiente | Técnico Hidrometrista Júnior", score: 100, verificado: false, recente: true, avatar: "https://drive.google.com/thumbnail?id=1c2_20EH6Hvx86wPhK1Ym5LXPbUH2WOLu&sz=w800", url: "https://hidrogest.github.io/rafaellinkedin" },
      { nome: "Alvimar Alves dos Santos", cargo: "Engenheiro Ambiental | Analista Ambiental", score: 100, verificado: false, recente: true, avatar: "https://drive.google.com/thumbnail?id=1aQTTGGcBFWT9fLmK5_AIytrklAKQBTKR&sz=w800", url: "https://hidrogest.github.io/alvimarlinkedin" },
      { nome: "Membro Pendente", cargo: "Trabalhando no perfil...", pendente: true }
    ];

    const SVG = {
      shield: `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1 1 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path fill="none" stroke="#fff" stroke-width="2" d="m9 12 2 2 4-4"/></svg>`,
      check: `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>`,
      alert: `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>`,
      ext: `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`,
      user: `<svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
      loader: `<svg width="16" height="16" viewBox="0 0 24 24"><style>.s{transform-origin:center;animation:r .75s infinite linear}@keyframes r{100%{transform:rotate(360deg)}}</style><path d="M12,1A11,11,0,1,0,23,12,11,11,0,0,0,12,1Zm0,19a8,8,0,1,1,8-8A8,8,0,0,1,12,20Z" opacity=".25"/><path d="M10.14,1.16a11,11,0,0,0-9,8.92A1.59,1.59,0,0,0,2.46,12A1.52,1.52,0,0,0,4.11,10.7a8,8,0,0,1,6.66-6.61A1.42,1.42,0,0,0,12,2.69h0A1.57,1.57,0,0,0,10.14,1.16Z" class="s"/></svg>`,
      li: `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.4 20.4h-3.5v-5.5c0-1.3 0-3-1.8-3s-2.1 1.4-2.1 2.9v5.6H9.3V9h3.4v1.5c.5-.9 1.6-1.8 3.3-1.8 3.6 0 4.2 2.3 4.2 5.4v6.3zM5.3 7.4c-1.1 0-2-.9-2-2 0-1.1.9-2 2-2s2 .9 2 2c0 1.1-.9 2-2 2zm1.7 13H3.5V9h3.5v11.4zM22.2 0H1.7C.7 0 0 .7 0 1.7v20.5C0 23.2.7 24 1.7 24h20.4c1 0 1.7-.7 1.7-1.7V1.7C24 .7 23.2 0 22.2 0z"/></svg>`,
      sparkle: `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3Z"/></svg>`
    };

    let search = '';
    const active = TEAM.filter(m => !m.pendente);
    const avg = Math.round(active.reduce((a, b) => a + b.score, 0) / active.length);
    document.getElementById('stat-count').textContent = active.length;
    document.getElementById('stat-avg').textContent = avg + '%';
    setTimeout(() => document.getElementById('avg-bar').style.width = avg + '%', 150);

    document.getElementById('search').addEventListener('input', e => { search = e.target.value.toLowerCase(); render(); });

    function render() {
      const grid = document.getElementById('grid');
      const filtered = TEAM.filter(m => m.nome.toLowerCase().includes(search) || m.cargo.toLowerCase().includes(search));

      grid.innerHTML = filtered.map((m, i) => {
        if (m.pendente) return `
          <div class="card" style="animation-delay:${i*50}ms">
            <div class="card-identity"><div class="avatar pending">${SVG.user}</div>
            <div style="width:100%"><div class="card-name" style="color:var(--text-muted)">${m.nome}</div><div class="card-role">${m.cargo}</div>
            <div class="verify-pill working">${SVG.loader} Mapeando</div></div></div>
            <div class="card-footer"><button class="card-cta disabled">Indisponível</button></div>
          </div>`;

        const tier = m.score >= 90 ? 'high' : m.score >= 50 ? 'mid' : 'low';
        const label = m.score >= 90 ? 'Concluído' : m.score >= 50 ? 'Em andamento' : 'Iniciado';
        const fallback = `https://ui-avatars.com/api/?name=${encodeURIComponent(m.nome)}&size=200&background=0a66c2&color=fff&bold=true`;

        return `
          <div class="card" style="animation-delay:${i*50}ms">
            <div class="card-header">
              <div style="display:flex;gap:.5rem">${m.recente ? `<span class="recent-badge">${SVG.sparkle} Recente</span>` : ''}</div>
              <span class="li-icon">${SVG.li}</span>
            </div>
            <div class="card-identity">
              <div class="avatar-wrap"><img class="avatar" src="${m.avatar}" onerror="this.src='${fallback}'"/>
              ${m.score >= 90 ? `<span class="score-badge">${SVG.shield}</span>` : ''}</div>
              <div style="width:100%"><div class="card-name">${m.nome}</div><div class="card-role">${m.cargo}</div>
              <div class="verify-pill ${m.verificado ? 'confirmed' : 'pending'}">${m.verificado ? SVG.check : SVG.alert} ${m.verificado ? 'Verificada' : 'Não Verificada'}</div></div>
            </div>
            <div class="card-footer">
              <div class="progress-meta"><span class="progress-label">Otimização</span>
              <div style="text-align:right"><div class="score-num ${tier}">${m.score}%</div><div class="score-status ${tier}">${label}</div></div></div>
              <div class="progress-track"><div class="progress-fill ${tier}" data-width="${m.score}" style="width:0%"></div></div>
              <a class="card-cta" href="${m.url}" target="_blank">Ver Relatório ${SVG.ext}</a>
            </div>
          </div>`;
      }).join('');

      requestAnimationFrame(() => document.querySelectorAll('.progress-fill[data-width]').forEach(el => el.style.width = el.dataset.width + '%'));
    }
    render();
  </script>
</body>
</html>
