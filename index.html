<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub de Auditorias — Hidrogest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0B3B59;
      --navy-light: #0e4a72;
      --blue: #0a66c2;
      --blue-mid: #1478d4;
      --sky: #e8f3ff;
      --teal: #00b4aa;
      --white: #ffffff;
      --off-white: #f5f7fa;
      --gray-50: #f8fafc;
      --gray-100: #f0f4f8;
      --gray-200: #dde3ea;
      --gray-300: #c4cdd7;
      --gray-400: #8fa3b0;
      --gray-600: #4d6475;
      --gray-800: #1e3140;
      --green: #059669;
      --green-bg: #ecfdf5;
      --amber: #d97706;
      --amber-bg: #fffbeb;
      --red: #dc2626;
      --score-low: #f59e0b;
      --score-mid: #0a66c2;
      --score-high: #059669;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(ellipse 60% 50% at 10% 10%, rgba(10,102,194,.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 90% 80%, rgba(0,180,170,.07) 0%, transparent 60%),
        var(--gray-50);
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--gray-200);
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 2rem;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }

    .brand-logo {
      height: 40px;
      width: auto;
      display: block;
      object-fit: contain;
    }

    .brand-divider {
      width: 1px;
      height: 28px;
      background: var(--gray-200);
    }

    .brand-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.25rem;
      color: var(--navy);
      letter-spacing: -.01em;
    }

    .brand-sub {
      font-size: .72rem;
      font-weight: 500;
      color: var(--gray-400);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .header-stats {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: 14px;
      padding: .6rem 1.2rem;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: .6rem;
    }

    .stat-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .stat-icon.blue { background: var(--sky); color: var(--blue); }
    .stat-icon.green { background: var(--green-bg); color: var(--green); }

    .stat-label {
      font-size: .65rem;
      font-weight: 600;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: .1em;
      display: block;
      margin-bottom: 2px;
    }

    .stat-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--gray-800);
      line-height: 1;
    }

    .stat-sep { width: 1px; height: 28px; background: var(--gray-200); }

    .score-bar-wrap {
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .score-bar-track {
      width: 72px;
      height: 6px;
      background: var(--gray-200);
      border-radius: 99px;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--blue);
      transition: width 1s cubic-bezier(.22,1,.36,1);
    }

    /* ── Main ── */
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2.5rem 2rem 4rem;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 16px;
      padding: .9rem 1.2rem;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-400);
      pointer-events: none;
      display: flex;
    }

    .search-input {
      width: 100%;
      padding: .65rem 1rem .65rem 2.75rem;
      border: 1px solid var(--gray-200);
      border-radius: 99px;
      font-family: 'DM Sans', sans-serif;
      font-size: .875rem;
      color: var(--gray-800);
      background: var(--gray-50);
      transition: border-color .2s, background .2s;
      outline: none;
    }

    .search-input::placeholder { color: var(--gray-300); }
    .search-input:focus { border-color: var(--blue); background: var(--white); }

    .filters {
      display: flex;
      align-items: center;
      gap: .5rem;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: .72rem;
      font-weight: 600;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-right: .25rem;
    }

    .filter-btn {
      padding: .45rem 1rem;
      border-radius: 99px;
      border: 1px solid var(--gray-200);
      background: var(--gray-50);
      color: var(--gray-600);
      font-family: 'DM Sans', sans-serif;
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }

    .filter-btn:hover { background: var(--gray-100); border-color: var(--gray-300); }

    .filter-btn.active {
      background: var(--navy);
      border-color: var(--navy);
      color: var(--white);
    }

    /* ── Card Grid ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 20px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      transition: transform .25s cubic-bezier(.22,1,.36,1), box-shadow .25s, border-color .25s;
      opacity: 0;
      animation: fadeUp .5s cubic-bezier(.22,1,.36,1) forwards;
      cursor: default;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(11,59,89,.1);
      border-color: rgba(10,102,194,.2);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Card header row */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .dept-badge {
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .12em;
      padding: .3rem .75rem;
      border-radius: 99px;
      background: var(--gray-100);
      color: var(--gray-600);
      border: 1px solid var(--gray-200);
    }

    .li-icon {
      color: var(--gray-300);
      transition: color .2s, transform .2s;
      margin-top: 2px;
    }

    .card:hover .li-icon { color: var(--blue); transform: scale(1.1); }

    /* Avatar block */
    .card-identity {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: .75rem;
    }

    .avatar-wrap {
      position: relative;
      display: inline-block;
    }

    .avatar {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--white);
      box-shadow: 0 0 0 2px var(--gray-200);
      display: block;
      transition: box-shadow .25s;
    }

    .card:hover .avatar { box-shadow: 0 0 0 3px var(--blue); }

    .score-badge {
      position: absolute;
      bottom: 0;
      right: -2px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--green);
      border: 2px solid var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--gray-800);
      line-height: 1.25;
      transition: color .2s;
    }

    .card:hover .card-name { color: var(--blue); }

    .card-role {
      font-size: .8rem;
      color: var(--gray-400);
      font-weight: 400;
      line-height: 1.4;
      margin-top: 2px;
    }

    /* Verification Pill - Made Highly Visible */
    .verify-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .45rem;
      font-size: .75rem;
      font-weight: 700;
      padding: .45rem 1rem;
      border-radius: 8px;
      margin-top: 12px;
      width: 100%;
    }

    .verify-pill.confirmed { 
      background: var(--green-bg); 
      color: var(--green); 
      border: 1px solid #a7f3d0; 
    }
    
    .verify-pill.pending { 
      background: #fff7ed; /* Soft amber/orange background */
      color: #c2410c; /* Strong amber/orange text */
      border: 1px solid #fed7aa; 
    }

    /* Progress area */
    .card-footer {
      margin-top: auto;
      padding-top: 1.25rem;
      border-top: 1px solid var(--gray-100);
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .progress-label {
      font-size: .65rem;
      font-weight: 600;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: .1em;
    }

    .progress-score {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1px;
    }

    .score-num {
      font-size: 1.2rem;
      font-weight: 800;
      line-height: 1;
    }

    .score-num.high { color: var(--score-high); }
    .score-num.mid  { color: var(--score-mid); }
    .score-num.low  { color: var(--score-low); }

    .score-status {
      font-size: .62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
    }

    .score-status.high { color: var(--score-high); }
    .score-status.mid  { color: var(--score-mid); }
    .score-status.low  { color: var(--score-low); }

    .progress-track {
      height: 8px;
      background: var(--gray-100);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 1s cubic-bezier(.22,1,.36,1);
    }

    .progress-fill.high { background: var(--score-high); }
    .progress-fill.mid  { background: linear-gradient(90deg, var(--blue-mid), var(--blue)); }
    .progress-fill.low  { background: var(--score-low); }

    .card-cta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: 10px;
      padding: .75rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .15s;
      text-decoration: none;
      letter-spacing: .01em;
    }

    .card-cta:hover { background: var(--navy-light); transform: translateY(-1px); }
    .card-cta:active { transform: scale(.98); }

    .cta-arrow {
      transition: transform .2s;
      opacity: .7;
    }

    .card-cta:hover .cta-arrow { transform: translate(2px, -2px); opacity: 1; }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 2rem;
      background: var(--white);
      border: 2px dashed var(--gray-200);
      border-radius: 20px;
    }

    .empty-icon {
      width: 56px;
      height: 56px;
      background: var(--gray-100);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
      color: var(--gray-300);
    }

    .empty-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--gray-800);
      margin-bottom: .5rem;
    }

    .empty-sub {
      font-size: .875rem;
      color: var(--gray-400);
      max-width: 340px;
      margin: 0 auto 1.5rem;
    }

    .empty-reset {
      padding: .65rem 1.5rem;
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 99px;
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem;
      font-weight: 600;
      color: var(--navy);
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }

    .empty-reset:hover { border-color: var(--blue); color: var(--blue); }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .header-inner { padding: 0 1rem; }
      main { padding: 1.5rem 1rem 3rem; }
      .header-stats { display: none; }
      .brand-title { font-size: 1.05rem; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-inner">
      <div class="header-brand">
        <img
          class="brand-logo"
          src="https://drive.google.com/thumbnail?id=1aWt-ZBZIvBdviJ3hoYVExMUoQlFEt15O&sz=w200"
          alt="Hidrogest"
          onerror="this.style.display='none'"
        />
        <div class="brand-divider"></div>
        <div>
          <div class="brand-title">Hub de Auditorias</div>
          <div class="brand-sub">Otimização de Perfis Profissionais</div>
        </div>
      </div>

      <div class="header-stats" id="header-stats">
        <div class="stat-item">
          <div class="stat-icon blue">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
              <path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          </div>
          <div>
            <span class="stat-label">Membros</span>
            <span class="stat-value" id="stat-count">—</span>
          </div>
        </div>
        <div class="stat-sep"></div>
        <div class="stat-item">
          <div class="stat-icon green">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.849-3.037-1.85 0-2.133 1.448-2.133 2.944v5.662H9.356V9h3.414v1.566h.049c.475-.9 1.636-1.85 3.367-1.85 3.596 0 4.261 2.366 4.261 5.445v6.291zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
          </div>
          <div>
            <span class="stat-label">Score Médio</span>
            <div class="score-bar-wrap">
              <div class="score-bar-track"><div class="score-bar-fill" id="avg-bar" style="width:0%"></div></div>
              <span class="stat-value" id="stat-avg">—</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main>
    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">
          <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input
          id="search"
          class="search-input"
          type="text"
          placeholder="Buscar por nome ou cargo…"
          autocomplete="off"
        />
      </div>
      <div class="filters" id="filters"></div>
    </div>

    <!-- Grid -->
    <div class="card-grid" id="grid"></div>
  </main>

  <script>
    const TEAM = [
      {
        id: "antonio",
        nome: "Antônio José Machado",
        cargo: "Sócio Diretor & Engenheiro Responsável",
        departamento: "Diretoria",
        score: 100,
        verificado: false,
        avatar: "https://drive.google.com/thumbnail?id=1-jBHy0UWqwNi5RAvII22ltyVMfxuj4Xn&sz=w400",
        fallback: "https://ui-avatars.com/api/?name=Antonio+Machado&size=200&background=0B3B59&color=fff&bold=true",
        url: "https://hidrogest.github.io/antoniolinkedin"
      },
      {
        id: "anna",
        nome: "Anna Pâula do Vale",
        cargo: "Gerente de Engenharia",
        departamento: "Engenharia",
        score: 90,
        verificado: true,
        avatar: "https://drive.google.com/thumbnail?id=1PXOebax4hkwDSVls3bGbOI3Sm4epWtHz&sz=w400",
        fallback: "https://ui-avatars.com/api/?name=Anna+Paula&size=200&background=0a66c2&color=fff&bold=true",
        url: "https://hidrogest.github.io/annalinkedin"
      },
      {
        id: "rosangela",
        nome: "Rosângela Gurgel Machado",
        cargo: "Engenheira Ambiental Master",
        departamento: "Engenharia",
        score: 100,
        verificado: false,
        avatar: "https://drive.google.com/thumbnail?id=1KZ-A61W689c2rvUvocNZpEhaqxpsFZ4_&sz=w400",
        fallback: "https://ui-avatars.com/api/?name=Rosangela+Gurgel&size=200&background=0a66c2&color=fff&bold=true",
        url: "https://hidrogest.github.io/rosangelalinkedin"
      },
      {
        id: "michel",
        nome: "Michel Oliveira",
        cargo: "Coordenador de Hidrometria e Topografia",
        departamento: "Operações",
        score: 100,
        verificado: true,
        avatar: "https://drive.google.com/thumbnail?id=1Fe4yCPfrkCqWWUERvMC4HGS3pY76JBwg&sz=w400",
        fallback: "https://ui-avatars.com/api/?name=Michel+Oliveira&size=200&background=0a66c2&color=fff&bold=true",
        url: "https://hidrogest.github.io/michellinkedin"
      },
      {
        id: "mariane",
        nome: "Mariane Rodrigues Silveira",
        cargo: "Gestão Administrativa e Financeira",
        departamento: "Administrativo",
        score: 30,
        verificado: true,
        avatar: "https://drive.google.com/thumbnail?id=1To0II_tJNLy4F6bxqCrNOs_DodpEE0bk&sz=w400",
        fallback: "https://ui-avatars.com/api/?name=Mariane+Silveira&size=200&background=0a66c2&color=fff&bold=true",
        url: "https://hidrogest.github.io/marianelinkedin"
      }
    ];

    /* ── Helpers ── */
    function scoreMeta(score) {
      if (score >= 90) return { tier: 'high', label: 'Concluído' };
      if (score >= 50) return { tier: 'mid',  label: 'Em andamento' };
      return { tier: 'low', label: 'Iniciado' };
    }

    const DEPTS = ['Todos', ...new Set(TEAM.map(m => m.departamento))];

    /* ── State ── */
    let search = '';
    let dept   = 'Todos';

    /* ── Header stats ── */
    const avg = Math.round(TEAM.reduce((a, b) => a + b.score, 0) / TEAM.length);
    document.getElementById('stat-count').textContent = TEAM.length;
    document.getElementById('stat-avg').textContent   = avg + '%';
    setTimeout(() => { document.getElementById('avg-bar').style.width = avg + '%'; }, 150);

    /* ── Filter buttons ── */
    const filtersEl = document.getElementById('filters');
    const filterLabel = document.createElement('span');
    filterLabel.className = 'filter-label';
    filterLabel.textContent = 'Filtrar:';
    filtersEl.appendChild(filterLabel);

    DEPTS.forEach(d => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (d === 'Todos' ? ' active' : '');
      btn.textContent = d;
      btn.addEventListener('click', () => {
        dept = d;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
      filtersEl.appendChild(btn);
    });

    /* ── Search ── */
    document.getElementById('search').addEventListener('input', e => {
      search = e.target.value;
      render();
    });

    /* ── SVG icons ── */
    const SVG = {
      shield: `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path fill="none" stroke="#fff" stroke-width="2" d="m9 12 2 2 4-4"/></svg>`,
      shieldCheck: `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>`,
      alert:  `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>`,
      ext:    `<svg class="cta-arrow" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`,
      li:     `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.849-3.037-1.85 0-2.133 1.448-2.133 2.944v5.662H9.356V9h3.414v1.566h.049c.475-.9 1.636-1.85 3.367-1.85 3.596 0 4.261 2.366 4.261 5.445v6.291zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>`,
      search: `<svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`
    };

    /* ── Render ── */
    function render() {
      const grid = document.getElementById('grid');
      const q = search.toLowerCase();
      const filtered = TEAM.filter(m => {
        const matchQ = m.nome.toLowerCase().includes(q) || m.cargo.toLowerCase().includes(q);
        const matchD = dept === 'Todos' || m.departamento === dept;
        return matchQ && matchD;
      });

      if (!filtered.length) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">${SVG.search}</div>
            <div class="empty-title">Nenhum profissional encontrado</div>
            <p class="empty-sub">Nenhum resultado para os critérios atuais. Ajuste a busca ou o filtro.</p>
            <button class="empty-reset" id="reset-btn">Limpar filtros</button>
          </div>`;
        document.getElementById('reset-btn').addEventListener('click', () => {
          search = ''; dept = 'Todos';
          document.getElementById('search').value = '';
          document.querySelectorAll('.filter-btn').forEach((b, i) => {
            b.classList.toggle('active', i === 0);
          });
          render();
        });
        return;
      }

      grid.innerHTML = filtered.map((m, i) => {
        const { tier, label } = scoreMeta(m.score);
        
        // Destacando drasticamente o status de verificação da identidade
        const verifHtml = m.verificado
          ? `<div class="verify-pill confirmed">${SVG.shieldCheck} Identidade Verificada</div>`
          : `<div class="verify-pill pending">${SVG.alert} Identidade Não Verificada</div>`;

        return `
          <div class="card" style="animation-delay:${i * 80}ms">
            <div class="card-header">
              <span class="dept-badge">${m.departamento}</span>
              <span class="li-icon">${SVG.li}</span>
            </div>

            <div class="card-identity">
              <div class="avatar-wrap">
                <img
                  class="avatar"
                  src="${m.avatar}"
                  alt="${m.nome}"
                  onerror="this.onerror=null;this.src='${m.fallback}'"
                />
                ${m.score >= 90 ? `<span class="score-badge">${SVG.shield}</span>` : ''}
              </div>
              <div style="width: 100%;">
                <div class="card-name">${m.nome}</div>
                <div class="card-role">${m.cargo}</div>
                ${verifHtml}
              </div>
            </div>

            <div class="card-footer">
              <div class="progress-meta">
                <span class="progress-label">Otimização</span>
                <div class="progress-score">
                  <span class="score-num ${tier}">${m.score}%</span>
                  <span class="score-status ${tier}">${label}</span>
                </div>
              </div>
              <div class="progress-track">
                <div
                  class="progress-fill ${tier}"
                  data-width="${m.score}"
                  style="width:0%"
                ></div>
              </div>
              <a class="card-cta" href="${m.url}" target="_blank" rel="noopener">
                Ver Relatório ${SVG.ext}
              </a>
            </div>
          </div>`;
      }).join('');

      /* Animate progress bars after paint */
      requestAnimationFrame(() => {
        document.querySelectorAll('.progress-fill[data-width]').forEach(el => {
          el.style.width = el.dataset.width + '%';
        });
      });
    }

    render();
  </script>
</body>
</html>
