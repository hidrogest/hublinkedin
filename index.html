<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub de Auditorias — Hidrogest</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0B3B59; --navy-light: #0e4a72; --blue: #0a66c2; --blue-mid: #1478d4;
      --sky: #e8f3ff; --teal: #00b4aa; --white: #ffffff; --gray-50: #f8fafc;
      --gray-100: #f0f4f8; --gray-200: #dde3ea; --gray-300: #c4cdd7; --gray-400: #8fa3b0;
      --gray-600: #4d6475; --gray-800: #1e3140; --green: #059669; --green-bg: #ecfdf5;
      --score-low: #f59e0b; --score-mid: #0a66c2; --score-high: #059669;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--gray-50); color: var(--gray-800); min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -1;
      background: radial-gradient(ellipse 60% 50% at 10% 10%, rgba(10,102,194,.08) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 60% at 90% 80%, rgba(0,180,170,.07) 0%, transparent 60%), var(--gray-50);
    }
    
    /* Header & Toolbar */
    header { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--gray-200); }
    .header-inner { max-width: 1280px; margin: 0 auto; padding: 0 2rem; height: 68px; display: flex; align-items: center; justify-content: space-between; gap: 1.5rem; }
    .header-brand { display: flex; align-items: center; gap: 1rem; }
    .brand-logo { height: 40px; }
    .brand-title { font-family: 'DM Serif Display', serif; font-size: 1.25rem; color: var(--navy); }
    .brand-sub { font-size: .72rem; font-weight: 500; color: var(--gray-400); text-transform: uppercase; letter-spacing: .08em; }
    .header-stats { display: flex; gap: 1.5rem; background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 14px; padding: .6rem 1.2rem; }
    .stat-item { display: flex; align-items: center; gap: .6rem; }
    .stat-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .stat-icon.blue { background: var(--sky); color: var(--blue); }
    .stat-icon.green { background: var(--green-bg); color: var(--green); }
    .stat-label { font-size: .65rem; font-weight: 600; color: var(--gray-400); text-transform: uppercase; margin-bottom: 2px; display: block;}
    .stat-value { font-size: 1.1rem; font-weight: 700; line-height: 1; }
    .score-bar-track { width: 72px; height: 6px; background: var(--gray-200); border-radius: 99px; overflow: hidden; display: inline-block; }
    .score-bar-fill { height: 100%; background: var(--blue); transition: width 1s ease; }
    
    main { max-width: 1280px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }
    .toolbar { display: flex; gap: 1rem; margin-bottom: 2rem; background: var(--white); border: 1px solid var(--gray-200); border-radius: 16px; padding: .9rem 1.2rem; }
    .search-wrap { position: relative; flex: 1; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--gray-400); }
    .search-input { width: 100%; padding: .65rem 1rem .65rem 2.75rem; border: 1px solid var(--gray-200); border-radius: 99px; font: inherit; font-size: .875rem; outline: none; }
    .search-input:focus { border-color: var(--blue); }
    
    /* Cards */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 1.25rem; }
    .card { background: var(--white); border: 1px solid var(--gray-200); border-radius: 20px; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.25rem; animation: fadeUp .5s ease forwards; transition: transform .2s, box-shadow .2s; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(11,59,89,.1); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .dept-badge, .recent-badge { font-size: .65rem; font-weight: 700; text-transform: uppercase; padding: .3rem .75rem; border-radius: 99px; border: 1px solid; }
    .dept-badge { background: var(--gray-100); color: var(--gray-600); border-color: var(--gray-200); }
    .recent-badge { background: #fdf4ff; color: #c026d3; border-color: #f5d0fe; display: flex; gap: .25rem; align-items: center; }
    .li-icon { color: var(--gray-300); } .card:hover .li-icon { color: var(--blue); }
    
    .card-identity { text-align: center; display: flex; flex-direction: column; align-items: center; gap: .75rem; }
    .avatar-wrap { position: relative; }
    .avatar { width: 76px; height: 76px; border-radius: 50%; object-fit: cover; border: 3px solid var(--white); box-shadow: 0 0 0 2px var(--gray-200); }
    .avatar.pending { background: var(--gray-100); color: var(--gray-400); display: flex; align-items: center; justify-content: center; }
    .card:hover .avatar:not(.pending) { box-shadow: 0 0 0 3px var(--blue); }
    .score-badge { position: absolute; bottom: 0; right: -2px; width: 22px; height: 22px; border-radius: 50%; background: var(--green); border: 2px solid var(--white); display: flex; align-items: center; justify-content: center; color: #fff;}
    
    .card-name { font-size: 1.05rem; font-weight: 700; } .card:hover .card-name { color: var(--blue); }
    .card-role { font-size: .8rem; color: var(--gray-400); }
    .verify-pill { display: inline-flex; gap: .45rem; font-size: .75rem; font-weight: 700; padding: .4rem 1rem; border-radius: 8px; margin-top: 8px; width: 100%; justify-content: center; align-items: center; }
    .verify-pill.confirmed { background: var(--green-bg); color: var(--green); border: 1px solid #a7f3d0; }
    .verify-pill.pending { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
    .verify-pill.working { background: var(--gray-100); color: var(--gray-600); border: 1px solid var(--gray-200); }
    
    .card-footer { margin-top: auto; padding-top: 1.25rem; border-top: 1px solid var(--gray-100); display: flex; flex-direction: column; gap: .75rem; }
    .progress-meta { display: flex; justify-content: space-between; align-items: flex-end; }
    .progress-label, .score-status { font-size: .65rem; font-weight: 700; text-transform: uppercase; color: var(--gray-400); }
    .score-num { font-size: 1.2rem; font-weight: 800; line-height: 1; }
    .score-num.high, .score-status.high { color: var(--score-high); } .score-num.mid, .score-status.mid { color: var(--score-mid); } .score-num.low, .score-status.low { color: var(--score-low); }
    .progress-track { height: 8px; background: var(--gray-100); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; transition: width 1s ease; }
    .progress-fill.high { background: var(--score-high); } .progress-fill.mid { background: var(--blue-mid); } .progress-fill.low { background: var(--score-low); }
    
    .card-cta { display: flex; align-items: center; justify-content: center; gap: .4rem; background: var(--navy); color: var(--white); border-radius: 10px; padding: .75rem; font-size: .82rem; font-weight: 600; text-decoration: none; transition: .2s; }
    .card-cta:not(.disabled):hover { background: var(--navy-light); }
    .card-cta.disabled { background: var(--gray-200); color: var(--gray-500); cursor: not-allowed; }
    @media (max-width: 640px) { .header-stats { display: none; } main { padding: 1.5rem 1rem; } }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-brand">
        <img class="brand-logo" src="https://drive.google.com/thumbnail?id=1aWt-ZBZIvBdviJ3hoYVExMUoQlFEt15O&sz=w200" alt="Hidrogest">
        <div><div class="brand-title">Hub de Auditorias</div><div class="brand-sub">Otimização de Perfis</div></div>
      </div>
      <div class="header-stats">
        <div class="stat-item"><div class="stat-icon blue"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
        <div><span class="stat-label">Membros</span><span class="stat-value" id="stat-count">—</span></div></div>
        <div class="stat-item"><div class="stat-icon green"><svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M20.4 20.4h-3.5v-5.5c0-1.3 0-3-1.8-3s-2.1 1.4-2.1 2.9v5.6H9.3V9h3.4v1.5c.5-.9 1.6-1.8 3.3-1.8 3.6 0 4.2 2.3 4.2 5.4v6.3zM5.3 7.4c-1.1 0-2-.9-2-2 0-1.1.9-2 2-2s2 .9 2 2c0 1.1-.9 2-2 2zm1.7 13H3.5V9h3.5v11.4zM22.2 0H1.7C.7 0 0 .7 0 1.7v20.5C0 23.2.7 24 1.7 24h20.4c1 0 1.7-.7 1.7-1.7V1.7C24 .7 23.2 0 22.2 0z"/></svg></div>
        <div><span class="stat-label">Score Médio</span><div style="display:flex;gap:8px;align-items:center"><div class="score-bar-track"><div class="score-bar-fill" id="avg-bar" style="width:0%"></div></div><span class="stat-value" id="stat-avg">—</span></div></div></div>
      </div>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <div class="search-wrap">
        <svg class="search-icon" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search" class="search-input" type="text" placeholder="Buscar por nome ou cargo…" autocomplete="off">
      </div>
    </div>
    <div class="card-grid" id="grid"></div>
  </main>

  <script>
    // A lista atualizada contendo todos os perfis, incluindo Rafael e Alvimar
    const TEAM = [
      { nome: "Antônio José Machado", cargo: "Sócio Diretor & Eng. Responsável", score: 100, verificado: false, recente: true, avatar: "https://drive.google.com/thumbnail?id=1-jBHy0UWqwNi5RAvII22ltyVMfxuj4Xn&sz=w400", url: "https://hidrogest.github.io/antoniolinkedin" },
      { nome: "Thiago Gurgel Machado", cargo: "Diretor de Operações", score: 30, verificado: false, recente: true, avatar: "https://drive.google.com/thumbnail?id=1rcS6WvYD3xBvQXEzU4m_Chi0baymW0iJ&sz=w400", url: "https://hidrogest.github.io/thiagolinkedin" },
      { nome: "Anna Pâula do Vale", cargo: "Gerente de Engenharia", score: 90, verificado: true, recente: false, avatar: "https://drive.google.com/thumbnail?id=1PXOebax4hkwDSVls3bGbOI3Sm4epWtHz&sz=w400", url: "https://hidrogest.github.io/annalinkedin" },
      { nome: "Rosângela Gurgel Machado", cargo: "Diretora Técnica em Engenharia", score: 100, verificado: false, recente: false, avatar: "https://drive.google.com/thumbnail?id=1KZ-A61W689c2rvUvocNZpEhaqxpsFZ4_&sz=w400", url: "https://hidrogest.github.io/rosangelalinkedin" },
      { nome: "Michel Oliveira", cargo: "Coord. de Hidrometria e Topografia", score: 100, verificado: true, recente: false, avatar: "https://drive.google.com/thumbnail?id=1Fe4yCPfrkCqWWUERvMC4HGS3pY76JBwg&sz=w400", url: "https://hidrogest.github.io/michellinkedin" },
      { nome: "Mariane Rodrigues Silveira", cargo: "Gestão Adm. e Financeira", score: 30, verificado: true, recente: true, avatar: "https://drive.google.com/thumbnail?id=1To0II_tJNLy4F6bxqCrNOs_DodpEE0bk&sz=w400", url: "https://hidrogest.github.io/marianelinkedin" },
      { nome: "Leonardo Gurgel Machado", cargo: "Diretor Executivo", score: 95, verificado: true, recente: true, avatar: "https://drive.google.com/thumbnail?id=1S5nhIbBQXa7asM34lzmIf6bYBm5CiY25&sz=w800", url: "https://hidrogest.github.io/leonardolinkedin" },
      { nome: "Altamir Teixeira da Gama", cargo: "Técnico Hidrometrista Sênior", score: 100, verificado: false, recente: true, avatar: "https://drive.google.com/thumbnail?id=13eQo8nqMCL67PRPlAd7BcqchJVP-iLVd&sz=w800", url: "https://hidrogest.github.io/altamirlinkedin" },
      { nome: "Dieyme Junior Dornas de Amorim", cargo: "Técnico Hidrometrista & Marinheiro Fluvial", score: 100, verificado: false, recente: true, avatar: "https://drive.google.com/thumbnail?id=1joo7Z6vBMKFMYzYySR9gGl6BXKYCEKRO&sz=w800", url: "https://hidrogest.github.io/dieymelinkedin" },
      { nome: "Glayson Alves de Jesus", cargo: "Analista Financeiro e de Qualidade Sênior", score: 100, verificado: false, recente: true, avatar: "https://drive.google.com/thumbnail?id=1R9iGTL_wu-NiDj1LmrFLZyE-zHqAB8dg&sz=w800", url: "https://hidrogest.github.io/glaysonlinkedin" },
      { nome: "Guilherme Moura Costa Gomes", cargo: "Técnico Hidrometrista Pleno", score: 100, verificado: false, recente: true, avatar: "https://drive.google.com/thumbnail?id=1MXqmEpY_Da2xxosAn5wNPPxYEyxIUKiB&sz=w800", url: "https://hidrogest.github.io/guilhermelinkedin" },
      { nome: "João Pedro Nascimento de Sousa", cargo: "Técnico Ambiental", score: 100, verificado: false, recente: true, avatar: "https://drive.google.com/thumbnail?id=1214VTK6PnbfHN6djgbhLxj9dLEksTHQo&sz=w800", url: "https://hidrogest.github.io/joaopedrolinkedin" },
      { nome: "Douglas Maxiliano Rosa de Oliveira", cargo: "Técnico Hidrometrista Júnior", score: 100, verificado: false, recente: true, avatar: "https://ui-avatars.com/api/?name=Douglas+Maxiliano&size=400&background=0a66c2&color=fff", url: "https://hidrogest.github.io/douglaslinkedin" },
      { nome: "Rafael Pereira dos Santos", cargo: "Técnico em Meio Ambiente | Técnico Hidrometrista Júnior", score: 100, verificado: false, recente: true, avatar: "https://drive.google.com/thumbnail?id=1c2_20EH6Hvx86wPhK1Ym5LXPbUH2WOLu&sz=w800", url: "https://hidrogest.github.io/rafaellinkedin" },
      { nome: "Alvimar Alves dos Santos", cargo: "Engenheiro Ambiental | Analista Ambiental", score: 100, verificado: false, recente: true, avatar: "https://drive.google.com/thumbnail?id=1aQTTGGcBFWT9fLmK5_AIytrklAKQBTKR&sz=w800", url: "https://hidrogest.github.io/alvimarlinkedin" },
      { nome: "Membro Pendente", cargo: "Trabalhando no perfil...", pendente: true }
    ];

    const SVG = {
      shield: `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1 1 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path fill="none" stroke="#fff" stroke-width="2" d="m9 12 2 2 4-4"/></svg>`,
      check: `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>`,
      alert: `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>`,
      ext: `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`,
      user: `<svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
      loader: `<svg width="16" height="16" viewBox="0 0 24 24"><style>.s{transform-origin:center;animation:r .75s infinite linear}@keyframes r{100%{transform:rotate(360deg)}}</style><path d="M12,1A11,11,0,1,0,23,12,11,11,0,0,0,12,1Zm0,19a8,8,0,1,1,8-8A8,8,0,0,1,12,20Z" opacity=".25"/><path d="M10.14,1.16a11,11,0,0,0-9,8.92A1.59,1.59,0,0,0,2.46,12A1.52,1.52,0,0,0,4.11,10.7a8,8,0,0,1,6.66-6.61A1.42,1.42,0,0,0,12,2.69h0A1.57,1.57,0,0,0,10.14,1.16Z" class="s"/></svg>`,
      li: `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.4 20.4h-3.5v-5.5c0-1.3 0-3-1.8-3s-2.1 1.4-2.1 2.9v5.6H9.3V9h3.4v1.5c.5-.9 1.6-1.8 3.3-1.8 3.6 0 4.2 2.3 4.2 5.4v6.3zM5.3 7.4c-1.1 0-2-.9-2-2 0-1.1.9-2 2-2s2 .9 2 2c0 1.1-.9 2-2 2zm1.7 13H3.5V9h3.5v11.4zM22.2 0H1.7C.7 0 0 .7 0 1.7v20.5C0 23.2.7 24 1.7 24h20.4c1 0 1.7-.7 1.7-1.7V1.7C24 .7 23.2 0 22.2 0z"/></svg>`,
      sparkle: `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3Z"/></svg>`
    };

    let search = '';
    const active = TEAM.filter(m => !m.pendente);
    const avg = Math.round(active.reduce((a, b) => a + b.score, 0) / active.length);
    document.getElementById('stat-count').textContent = active.length;
    document.getElementById('stat-avg').textContent = avg + '%';
    setTimeout(() => document.getElementById('avg-bar').style.width = avg + '%', 150);

    document.getElementById('search').addEventListener('input', e => { search = e.target.value.toLowerCase(); render(); });

    function render() {
      const grid = document.getElementById('grid');
      const filtered = TEAM.filter(m => m.nome.toLowerCase().includes(search) || m.cargo.toLowerCase().includes(search));

      grid.innerHTML = filtered.map((m, i) => {
        if (m.pendente) return `
          <div class="card" style="animation-delay:${i*50}ms">
            <div class="card-identity"><div class="avatar pending">${SVG.user}</div>
            <div style="width:100%"><div class="card-name" style="color:var(--gray-400)">${m.nome}</div><div class="card-role">${m.cargo}</div>
            <div class="verify-pill working">${SVG.loader} Mapeando</div></div></div>
            <div class="card-footer"><button class="card-cta disabled">Indisponível</button></div>
          </div>`;

        const tier = m.score >= 90 ? 'high' : m.score >= 50 ? 'mid' : 'low';
        const label = m.score >= 90 ? 'Concluído' : m.score >= 50 ? 'Em andamento' : 'Iniciado';
        const fallback = `https://ui-avatars.com/api/?name=${encodeURIComponent(m.nome)}&size=200&background=0a66c2&color=fff&bold=true`;

        return `
          <div class="card" style="animation-delay:${i*50}ms">
            <div class="card-header">
              <div style="display:flex;gap:.5rem">${m.recente ? `<span class="recent-badge">${SVG.sparkle} Recente</span>` : ''}</div>
              <span class="li-icon">${SVG.li}</span>
            </div>
            <div class="card-identity">
              <div class="avatar-wrap"><img class="avatar" src="${m.avatar}" onerror="this.src='${fallback}'"/>
              ${m.score >= 90 ? `<span class="score-badge">${SVG.shield}</span>` : ''}</div>
              <div style="width:100%"><div class="card-name">${m.nome}</div><div class="card-role">${m.cargo}</div>
              <div class="verify-pill ${m.verificado ? 'confirmed' : 'pending'}">${m.verificado ? SVG.check : SVG.alert} ${m.verificado ? 'Verificada' : 'Não Verificada'}</div></div>
            </div>
            <div class="card-footer">
              <div class="progress-meta"><span class="progress-label">Otimização</span>
              <div style="text-align:right"><div class="score-num ${tier}">${m.score}%</div><div class="score-status ${tier}">${label}</div></div></div>
              <div class="progress-track"><div class="progress-fill ${tier}" data-width="${m.score}" style="width:0%"></div></div>
              <a class="card-cta" href="${m.url}" target="_blank">Ver Relatório ${SVG.ext}</a>
            </div>
          </div>`;
      }).join('');

      requestAnimationFrame(() => document.querySelectorAll('.progress-fill[data-width]').forEach(el => el.style.width = el.dataset.width + '%'));
    }
    render();
  </script>
</body>
</html>
